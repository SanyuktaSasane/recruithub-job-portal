<!DOCTYPE html>
<html>
<head>
    <title>Candidate Dashboard - RecruitHub</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
            color: #667eea;
        }

        .logout-btn {
            background: #ff4b5c;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #e63946;
        }

        .dashboard {
            padding: 50px;
            text-align: center;
            color: white;
        }

        .cards {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .card {
            background: white;
            color: #333;
            width: 260px;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: 0.3s ease;
            text-decoration: none;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .card p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">RecruitHub</div>
    <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
</div>

<div class="dashboard">
    <h1>Welcome, {{ request.user.username }} 👋</h1>
    <p>Explore jobs and track your applications</p>

    <div class="cards">

        <a href="{% url 'view_jobs' %}" class="card">
            <h3>Browse Jobs</h3>
            <p>Explore available job opportunities.</p>
        </a>

        <a href="{% url 'my_applications' %}" class="card">
            <h3>My Applications</h3>
            <p>Track your job application status.</p>
        </a>

    </div>

</div>

</body>
</html>
